version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: dna_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dna_steganography
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dna_steganography"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dna_network
  redis:
    image: redis:7-alpine
    container_name: dna_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dna_network
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dna_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dna_steganography
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-very-long-secret-key}
      REPORTS_DIR: /app/reports
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - reports_data:/app/reports
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dna_network
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dna_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q celery
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dna_steganography
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-very-long-secret-key}
      REPORTS_DIR: /app/reports
      ENVIRONMENT: ${ENVIRONMENT:-production}
    volumes:
      - reports_data:/app/reports
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dna_network
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dna_celery_beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/dna_steganography
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-very-long-secret-key}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dna_network
  nginx:
    image: nginx:alpine
    container_name: dna_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - dna_network
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  reports_data:
    driver: local
  uploads_data:
    driver: local
networks:
  dna_network:
    driver: bridge